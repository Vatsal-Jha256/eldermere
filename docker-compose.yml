name: eldermere

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eldermere
      POSTGRES_PASSWORD: eldermere
      POSTGRES_DB: eldermere
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eldermere -d eldermere"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    image: eldermere-server:dev
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      APP_ENV: development
      SERVER_ADDR: :8080
      CONTENT_PACKS_DIR: /app/content-packs
      DATABASE_URL: postgres://eldermere:eldermere@db:5432/eldermere?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    image: eldermere-web:dev
    build:
      context: ./apps/web
    environment:
      PUBLIC_API_BASE: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  postgres-data:
